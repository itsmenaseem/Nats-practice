apiVersion: apps/v1
kind: Deployment

metadata:
  name: post-depl

spec:
  replicas: 1

  selector:
    matchLabels:
      app: posts

  template:
    metadata:
      labels:
        app: posts

    spec:
      containers:
        - name: posts
          image: sidnaseem/nats-post-service:1.1


---


apiVersion: v1
kind: Service

metadata:
  name: post-nodeport-svc

spec:
  type: NodePort

  selector:
    app: posts

  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 3000
