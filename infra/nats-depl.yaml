apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats-depl

spec:
  replicas: 1

  selector:
    matchLabels:
      app: nats

  template:
    metadata:
      labels:
        app: nats

    spec:
      containers:
        - name: nats
          image: nats:latest
          args:
            - "-js"
          ports:
            - containerPort: 4222

---

apiVersion: v1
kind: Service
metadata:
  name: nats-srv
spec:
  type: ClusterIP
  selector:
    app: nats
  ports:
    - name: client
      protocol: TCP
      port: 4222
      targetPort: 4222