apiVersion: apps/v1
kind: Deployment

metadata:
  name: comment-depl

spec:
  replicas: 1

  selector:
    matchLabels:
      app: comments

  template:
    metadata:
      labels:
        app: comments

    spec:
      containers:
        - name: comments
          image: yourdockerhub/comment:latest

---
apiVersion: v1
kind: Service

metadata:
  name: post-nodeport-svc

spec:
  type: NodePort

  selector:
    app: comments

  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 3000

