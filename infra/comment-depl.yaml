apiVersion: apps/v1
kind: Deployment

metadata:
  name: comment-depl

spec:
  replicas: 1

  selector:
    matchLabels:
      app: comments

  template:
    metadata:
      labels:
        app: comments

    spec:
      containers:
        - name: comments
          image: sidnaseem/nats-comment-service:1.4
          imagePullPolicy: Always

---
apiVersion: v1
kind: Service

metadata:
  name: comment-nodeport-svc

spec:
  type: NodePort

  selector:
    app: comments

  ports:
    - name: http
      protocol: TCP
      port: 3001
      targetPort: 3001

